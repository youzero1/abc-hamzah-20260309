version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - calculator_data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/calculator.sqlite
    restart: unless-stopped

volumes:
  calculator_data:
    driver: local
